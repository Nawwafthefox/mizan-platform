services:
  - type: web
    name: mizan-platform
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DATABASE
        value: mizan
      - key: JWT_SECRET
        sync: false
      - key: CORS_ORIGINS
        sync: false
